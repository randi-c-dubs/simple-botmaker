<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day of AI - Chatbot Builder</title>
    <link rel="icon" type="image/x-icon" href="./images/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brandPurple: '#BD519D',
                        brandBlue: '#4271B7',
                        brandGreen: '#1A9A48',
                        bgLight: '#F9F6F3'
                    }
                }
            }
        }
    </script>
    <style>
        /* High-touch custom CSS for chatbot preview rendering */
        .msg-bubble {
            max-width: 80%;
            border-radius: 1.25rem;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn {
            from { transform: scale(0.9); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        /* Scrollbar customization for visual canvas scrolling */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #CBD5E1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94A3B8;
        }
        /* Grid background look for flow canvas workspace */
        .canvas-grid-bg {
            background-size: 20px 20px;
            background-image: linear-gradient(to right, #f1f5f9 1px, transparent 1px),
                              linear-gradient(to bottom, #f1f5f9 1px, transparent 1px);
        }
    </style>
</head>
<body class="bg-bgLight text-slate-800 min-h-screen flex flex-col font-sans select-none">

    <header class="bg-white border-b-2 border-slate-100 px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4 sticky top-0 z-30 shadow-sm">
        <div class="flex items-center gap-3">
            <div class="flex gap-1 items-end"><a href="https://dayofai.org"><img src="./images/doai_logo.png" class="w-[51px]" alt="Day of AI"></a></div>
            <div>
                <span class="text-xl font-semibold text-brandBlue tracking-widest uppercase">Chatbot<br/>Playground</span>
            </div>
        </div>
        
        <div class="flex flex-wrap items-center gap-3">
            <button onclick="startTutorial()" class="px-4 py-2 border border-slate-200 hover:border-slate-300 hover:bg-slate-50 text-slate-600 font-bold text-sm rounded-full transition-all">
                Tutorial Guide
            </button>
            
            <div class="flex items-center gap-2">
                <input type="file" id="importFileInput" accept=".json" class="hidden" onchange="importChatbot(event)">
                
                <select id="workflowSelector" onchange="handleWorkflowSelection(this)" class="px-4 py-2 border border-slate-200 hover:border-slate-300 bg-white hover:bg-slate-50 text-slate-600 font-bold text-sm rounded-full transition-all outline-none cursor-pointer shadow-sm">
                    <option value="" disabled selected>Load/Import File</option>
                    <option value="dinner-chatbot.json">Template: Dinner Chatbot</option>
                    <option value="eliza_chatbot1.json">Template: EmotiBot</option>
                    <option value="upload">Upload Custom JSON File...</option>
                </select>

                <button onclick="exportChatbot()" class="px-4 py-2 border border-slate-200 hover:border-slate-300 hover:bg-slate-50 text-slate-600 font-bold text-sm rounded-full transition-all shadow-sm">
                    Export File
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 p-4 md:p-8 max-w-7xl w-full mx-auto flex flex-col gap-6">
        
        <div class="flex justify-center">
            <div class="flex bg-slate-200/70 p-1.5 rounded-full border border-slate-200/80 shadow-inner">
                <button id="buildTabBtn" onclick="switchTab('build')" class="px-8 py-2.5 text-m font-bold rounded-full transition-all duration-200 bg-brandPurple text-white shadow-sm">
                    🛠️ Build Mode
                </button>
                <button id="testTabBtn" onclick="switchTab('test')" class="px-8 py-2.5 text-m font-bold rounded-full transition-all duration-200 text-slate-600 hover:text-slate-900">
                    💬 Test Mode
                </button>
            </div>
        </div>
        
        <div id="buildPanel" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-2 bg-white rounded-2xl border border-slate-200 p-6 md:p-8 shadow-sm transition-all h-[600px] flex flex-col">
                <div class="flex justify-between items-center border-b border-slate-100 pb-4 mb-6">
                    <div class="flex items-center gap-3">
                        <button id="backBtn" onclick="goBack()" class="hidden px-3 py-1.5 text-xs font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors">
                            Back
                        </button>
                        <span id="activeNodeBadge" class="px-3 py-1 bg-blue-50 text-brandBlue text-xs font-bold rounded-full uppercase tracking-wider">
                            Active Block: Welcome Greeting
                        </span>
                    </div>
                    <span class="text-xs text-slate-400 font-semibold" id="nodeIdLabel">ID: root</span>
                </div>

                <div id="editorWorkspace" class="flex-1 overflow-y-auto pr-1">
                    </div>
            </div>

            <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm flex flex-col h-[600px]">
                <div class="border-b border-slate-100 pb-4 mb-4 flex flex-col sm:flex-row sm:items-center justify-between gap-2">
                    <div>
                        <h2 class="font-bold text-slate-800">Flowchart Map</h2>
                        <p class="text-[11px] text-slate-400 mt-0.5">Scroll to Zoom. Drag to Pan canvas around.</p>
                    </div>
                    <button onclick="resetZoomPan()" class="px-2.5 py-1 bg-slate-100 hover:bg-slate-200 text-slate-600 text-[10px] font-bold rounded-md transition-colors">
                        Reset View
                    </button>
                </div>
                
                <div id="flowMapContainer" class="flex-1 relative overflow-hidden bg-slate-50 border border-slate-100 rounded-xl canvas-grid-bg cursor-grab active:cursor-grabbing">
                    <div id="flowCanvas" class="absolute transform-gpu" style="transform-origin: 0 0;">
                        <svg id="flowSVG" class="absolute pointer-events-none z-5" style="width:100%; height:100%;">
                            <defs>
                                <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
                                    <path d="M 0 1.5 L 9 5 L 0 8.5 z" fill="#94A3B8"/>
                                </marker>
                            </defs>
                        </svg>
                        <div id="flowNodesContainer" class="absolute inset-0 z-10 pointer-events-none"></div>
                    </div>
                </div>
            </div>

        </div>

        <div id="testPanel" class="hidden max-w-xl mx-auto w-full">
            <div class="bg-white rounded-2xl border border-slate-200 shadow-md overflow-hidden flex flex-col h-[600px]">
                
                <div class="bg-white border-b border-slate-100 px-6 py-4 flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full bg-brandBlue flex items-center justify-center text-white font-black shadow-sm text-lg">
                            🤖
                        </div>
                        <div>
                            <h3 class="font-bold text-slate-900 leading-tight">My Custom Bot</h3>
                            <span class="flex items-center gap-1.5 text-xs text-emerald-600 font-semibold">
                                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span> Online
                            </span>
                        </div>
                    </div>
                    <button onclick="resetSimulation()" class="text-xs font-bold text-slate-500 bg-slate-100 hover:bg-slate-200 px-3 py-2 rounded-lg transition-colors">
                        Restart Chat
                    </button>
                </div>

                <div id="chatDisplay" class="flex-1 p-6 overflow-y-auto bg-slate-50/50 flex flex-col gap-4">
                    </div>

                <div class="p-4 bg-white border-t border-slate-100 min-h-[72px] flex items-center justify-center">
                    <div id="chatChoiceControls" class="flex flex-wrap gap-2 justify-center">
                        </div>
                </div>

            </div>
        </div>

    </main>

    <div id="customNotification" class="fixed bottom-4 right-4 bg-slate-900 text-white text-sm font-semibold px-4 py-3 rounded-xl shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center gap-2">
        <span id="notifIcon">🛑</span>
        <span id="notifText">Notification Message</span>
    </div>

    <div id="tourModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl max-w-lg w-full shadow-2xl overflow-hidden transform scale-95 transition-transform duration-300 flex flex-col min-h-[380px]">
            <div class="w-full bg-slate-100 h-2 flex">
                <div id="tourProgress" class="bg-brandPurple h-full transition-all duration-300" style="width: 20%"></div>
            </div>
            <div class="p-6 md:p-8 flex-1 flex flex-col justify-between">
                <div id="tourContent" class="space-y-4">
                    </div>
                <div class="mt-8 pt-4 border-t border-slate-100 flex items-center justify-between">
                    <button onclick="closeTutorial()" class="text-xs font-bold text-slate-400 hover:text-slate-600 tracking-wider uppercase transition-colors">
                        Skip Tour
                    </button>
                    <div class="flex gap-2">
                        <button id="tourPrevBtn" onclick="prevTutorialStep()" class="px-4 py-2 border border-slate-200 text-slate-600 font-bold text-sm rounded-full hover:bg-slate-50 transition-all disabled:opacity-40">
                            Back
                        </button>
                        <button id="tourNextBtn" onclick="nextTutorialStep()" class="px-5 py-2 bg-brandBlue hover:bg-opacity-90 text-white font-bold text-sm rounded-full transition-all shadow-md">
                            Next Step
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CENTRAL STATE OBJECT ---
        let appState = {
            activeNodeId: "root",
            historyStack: [],
            nodes: {
                "root": {
                    id: "root",
                    title: "Welcome Greeting",
                    text: "",
                    type: "message",
                    branches: []
                }
            },
            // Persistent Canvas Coordinate Transforms
            zoom: 1.0,
            panX: 20,
            panY: 20,
            isDragging: false,
            startX: 0,
            startY: 0
        };

        // --- GLOBAL APPARATUS INITIALIZATION SETUP ---
        window.addEventListener('DOMContentLoaded', () => {
            setupCanvasInteractionHandlers();
            renderEditor();
            renderFlowMap();
            setTimeout(startTutorial, 600);
        });

        // --- TAB SWITCHER LOGIC ---
        function switchTab(tab) {
            const buildBtn = document.getElementById('buildTabBtn');
            const testBtn = document.getElementById('testTabBtn');
            const buildPanel = document.getElementById('buildPanel');
            const testPanel = document.getElementById('testPanel');

            if (tab === 'build') {
                buildBtn.className = "px-8 py-2.5 text-m font-bold rounded-full transition-all duration-200 bg-brandPurple text-white shadow-sm";
                testBtn.className = "px-8 py-2.5 text-m font-bold rounded-full transition-all duration-200 text-slate-600 hover:text-slate-900";
                buildPanel.classList.remove('hidden');
                testPanel.classList.add('hidden');
                renderEditor();
                renderFlowMap();
            } else {
                buildBtn.className = "px-8 py-2.5 text-m font-bold rounded-full transition-all duration-200 text-slate-600 hover:text-slate-900";
                testBtn.className = "px-8 py-2.5 text-m font-bold rounded-full transition-all duration-200 bg-brandGreen text-white shadow-sm";
                buildPanel.classList.add('hidden');
                testPanel.classList.remove('hidden');
                resetSimulation();
            }
        }

        // --- APP ALERT ENGINE ---
        function showNotification(message, icon = '') {
            const notif = document.getElementById('customNotification');
            document.getElementById('notifIcon').innerText = icon;
            document.getElementById('notifText').innerText = message;
            
            notif.classList.remove('translate-y-20', 'opacity-0');
            notif.classList.add('translate-y-0', 'opacity-100');

            setTimeout(() => {
                notif.classList.remove('translate-y-0', 'opacity-100');
                notif.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // --- DATA BINDING MUTATORS ---
        function updateNodeText(value) {
            appState.nodes[appState.activeNodeId].text = value;
            renderFlowMap();
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.innerText = str;
            return div.innerHTML;
        }

        function linkifyText(escapedStr, speaker) {
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            const linkClass = speaker === 'bot' 
                ? 'underline text-sky-200 hover:text-white font-bold transition-all decoration-2' 
                : 'underline text-emerald-100 hover:text-white font-bold transition-all decoration-2';
            return escapedStr.replace(urlRegex, function(url) {
                return `<a href="${url}" target="_blank" rel="noopener noreferrer" class="${linkClass}">${url}</a>`;
            });
        }

        function updateBranchLabel(index, value) {
            const node = appState.nodes[appState.activeNodeId];
            node.branches[index].text = value;

            const targetId = node.branches[index].targetId;
            if (appState.nodes[targetId]) {
                appState.nodes[targetId].title = `Response: "${value}"`;
            }
            renderFlowMap();
        }

        // --- EXPORT AND IMPORT PROCESSORS ---
        function exportChatbot() {
            try {
                const exportState = { nodes: appState.nodes };
                const dataString = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(exportState, null, 2));
                const dummyAnchor = document.createElement('a');
                dummyAnchor.setAttribute("href", dataString);
                dummyAnchor.setAttribute("download", "my-chatbot.json");
                document.body.appendChild(dummyAnchor);
                dummyAnchor.click();
                dummyAnchor.remove();
                showNotification("Flow exported successfully!", "✅");
            } catch (err) {
                showNotification("Could not export data blueprint.");
            }
        }

        function handleWorkflowSelection(selectElement) {
            const chosenValue = selectElement.value;
            if (!chosenValue) return;

            if (chosenValue === "upload") {
                document.getElementById('importFileInput').click();
            } else {
                // Fetch template data payload relative to GitHub repository domain
                fetch(chosenValue)
                    .then(response => {
                        if (!response.ok) throw new Error("Network template file down.");
                        return response.json();
                    })
                    .then(data => {
                        loadParsedDataPayload(data);
                        showNotification("Template loaded successfully!", "📋");
                    })
                    .catch(err => {
                        showNotification("Could not fetch remote template workflow.");
                    });
            }
            selectElement.value = ""; // Reset value select marker context
        }

        function triggerImport() {
            document.getElementById('importFileInput').click();
        }

        function importChatbot(event) {
            const file = event.target.files[0];
            if (!file) return;

            const fileReader = new FileReader();
            fileReader.onload = function(e) {
                try {
                    const parsedData = JSON.parse(e.target.result);
                    loadParsedDataPayload(parsedData);
                    showNotification("Flow imported successfully!", "✅");
                } catch (err) {
                    showNotification("Invalid JSON schema structure parsing map template.");
                }
            };
            fileReader.readAsText(file);
            event.target.value = '';
        }

        function loadParsedDataPayload(payload) {
            if (payload && payload.nodes && payload.nodes["root"]) {
                appState.nodes = payload.nodes;
                appState.activeNodeId = "root";
                appState.historyStack = [];
                resetZoomPan();
                renderEditor();
                renderFlowMap();
            } else {
                showNotification("Incorrect workspace structure parsing template.");
            }
        }

        // --- NODE ARQUITECTURE METHODS ---
        function addBranch(isNextLinear = false) {
            const currentNode = appState.nodes[appState.activeNodeId];

            if (isNextLinear && currentNode.branches.some(b => b.isNext)) {
                showNotification("A 'Next' step block already exists for this node!");
                return;
            }

            const uniqueId = "node_" + Math.random().toString(36).substr(2, 9);
            const branchLabel = isNextLinear ? "Next" : `Choice option ${currentNode.branches.length + 1}`;

            appState.nodes[uniqueId] = {
                id: uniqueId,
                title: isNextLinear ? `Next Path` : `Response: "${branchLabel}"`,
                text: "",
                type: "message",
                branches: []
            };

            currentNode.branches.push({
                text: branchLabel,
                targetId: uniqueId,
                isNext: isNextLinear,
                isEnd: false
            });

            renderEditor();
            renderFlowMap();
        }

        function removeBranch(index) {
            const currentNode = appState.nodes[appState.activeNodeId];
            const targetId = currentNode.branches[index].targetId;

            delete appState.nodes[targetId];
            currentNode.branches.splice(index, 1);

            renderEditor();
            renderFlowMap();
        }

        function setNodeAsEnd() {
            const currentNode = appState.nodes[appState.activeNodeId];
            if (currentNode.branches.length > 0) {
                const confirmed = confirm("Are you sure? Converting this node to an End node will delete all its child choices.");
                if (!confirmed) return;
            }
            currentNode.branches = [];
            currentNode.type = "end";
            renderEditor();
            renderFlowMap();
        }

        function revertFromEnd() {
            const currentNode = appState.nodes[appState.activeNodeId];
            currentNode.type = "message";
            renderEditor();
            renderFlowMap();
        }

        function navigateTo(targetId) {
            appState.historyStack.push(appState.activeNodeId);
            appState.activeNodeId = targetId;
            renderEditor();
            renderFlowMap();
        }

        function goBack() {
            if (appState.historyStack.length > 0) {
                appState.activeNodeId = appState.historyStack.pop();
                renderEditor();
                renderFlowMap();
            }
        }

        // --- VISUAL EDITOR RENDER ENGINE ---
        function renderEditor() {
            const workspace = document.getElementById('editorWorkspace');
            const currentNode = appState.nodes[appState.activeNodeId];
            const backBtn = document.getElementById('backBtn');
            const badge = document.getElementById('activeNodeBadge');
            const idLabel = document.getElementById('nodeIdLabel');

            if (!currentNode) return;

            idLabel.innerText = `ID: ${currentNode.id}`;
            badge.innerText = currentNode.title;
            backBtn.classList.toggle('hidden', appState.historyStack.length === 0);

            if (currentNode.type === "end") {
                workspace.innerHTML = `
                    <div class="space-y-6">
                        <div class="space-y-2">
                            <label class="block text-sm font-black text-slate-700 uppercase tracking-wider">What the Bot Says (Goodbye Message):</label>
                            <textarea oninput="updateNodeText(this.value)" 
                                      placeholder="Type a final goodbye message..." 
                                      class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-brandBlue/20 focus:border-brandBlue focus:outline-none transition-all text-base font-semibold min-h-[120px] text-slate-800">${currentNode.text}</textarea>
                        </div>
                        <div class="p-4 bg-rose-50 border border-rose-100 rounded-xl flex flex-col sm:flex-row items-center justify-between gap-4">
                            <div class="text-xs text-rose-700 font-medium">
                                <strong>Ending Block:</strong> The chat simulation will automatically stop and present a restart flow sequence here.
                            </div>
                            <button onclick="revertFromEnd()" class="px-4 py-2 bg-white hover:bg-rose-100 text-rose-700 border border-rose-200 font-bold rounded-lg text-xs transition-colors shadow-sm whitespace-nowrap">
                                Restore to regular block
                            </button>
                        </div>
                    </div>
                `;
                return;
            }

            let branchesListHTML = "";
            if (currentNode.branches.length === 0) {
                branchesListHTML = `
                    <div class="text-center py-6 border-2 border-dashed border-slate-100 rounded-xl bg-slate-50/50 text-xs text-slate-400 font-semibold">
                        Create custom path branching options using the actions toolbox interface controls below.
                    </div>
                `;
            } else {
                currentNode.branches.forEach((branch, index) => {
                    const isNext = branch.isNext;
                    let borderClass = isNext ? 'border-l-4 border-l-brandPurple' : 'border-l-4 border-l-brandGreen';
                    let labelType = isNext ? '[Next Step]' : '[Choice Option]';

                    branchesListHTML += `
                        <div class="flex flex-col sm:flex-row items-stretch sm:items-center gap-3 p-3 bg-slate-50 rounded-xl border border-slate-100 ${borderClass}">
                            <div class="flex items-center gap-2 flex-1">
                                <span class="text-[10px] font-black text-slate-400 uppercase tracking-wider">${labelType}</span>
                                <input type="text" 
                                       value="${branch.text}" 
                                       oninput="updateBranchLabel(${index}, this.value)" 
                                       placeholder="Label text..." 
                                       class="flex-1 bg-white border border-slate-200 rounded-lg px-3 py-1.5 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-slate-200 text-slate-800"
                                       ${isNext ? 'disabled' : ''}>
                            </div>
                            <div class="flex items-center gap-2 justify-end">
                                <button onclick="navigateTo('${branch.targetId}')" class="px-3 py-1.5 bg-brandBlue text-white hover:bg-opacity-90 font-bold text-xs rounded-lg transition-colors shadow-sm">
                                    Edit Block
                                </button>
                                <button onclick="removeBranch(${index})" class="p-1.5 bg-rose-50 hover:bg-rose-100 text-rose-600 rounded-lg transition-colors">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                                </button>
                            </div>
                        </div>
                    `;
                });
            }

            workspace.innerHTML = `
                <div class="space-y-6">
                    <div class="space-y-2">
                        <label class="block text-sm font-black text-slate-700 uppercase tracking-wider">What the Bot Says:</label>
                        <textarea oninput="updateNodeText(this.value)" 
                                  placeholder="${currentNode.id === 'root' ? 'Type your welcome greeting message...' : 'Type what the bot says at this step...'}" 
                                  class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:bg-white focus:ring-2 focus:ring-brandBlue/20 focus:border-brandBlue focus:outline-none transition-all text-base font-semibold min-h-[120px] text-slate-800">${currentNode.text}</textarea>
                    </div>

                    <div class="space-y-3">
                        <label class="block text-sm font-black text-slate-700 uppercase tracking-wider">Choices & Navigation Pathways:</label>
                        <div class="space-y-2">${branchesListHTML}</div>
                    </div>

                    <div class="pt-4 border-t border-slate-100 flex flex-wrap gap-2">
                        <button onclick="addBranch(false)" class="flex-1 min-w-[140px] py-2.5 px-3 border border-brandGreen/40 hover:border-brandGreen bg-emerald-50/20 text-brandGreen font-bold rounded-xl text-sm transition-all">
                            + Add User Response
                        </button>
                        <button onclick="addBranch(true)" class="flex-1 min-w-[140px] py-2.5 px-3 border border-brandPurple/40 hover:border-brandPurple bg-pink-50/20 text-brandPurple font-bold rounded-xl text-sm transition-all">
                            Add "Next ↪️"
                        </button>
                        <button onclick="setNodeAsEnd()" class="flex-1 min-w-[140px] py-2.5 px-3 border border-rose-200 hover:border-rose-400 bg-rose-50/20 text-rose-600 font-bold rounded-xl text-sm transition-all">
                            🛑 End Conversation
                        </button>
                    </div>
                </div>
            `;
        }

        // ==========================================
        // --- NATIVE ZOOM & PAN CONTROL MODULE ---
        // ==========================================
        function setupCanvasInteractionHandlers() {
            const container = document.getElementById('flowMapContainer');
            
            container.addEventListener('wheel', (e) => {
                e.preventDefault();
                const zoomFactor = 0.08;
                if (e.deltaY < 0) {
                    appState.zoom = Math.min(2.0, appState.zoom + zoomFactor);
                } else {
                    appState.zoom = Math.max(0.4, appState.zoom - zoomFactor);
                }
                applyTransformLayoutProperties();
            }, { passive: false });

            container.addEventListener('mousedown', (e) => {
                if(e.target.closest('button')) return; // Allow node buttons to fire click events cleanly
                appState.isDragging = true;
                appState.startX = e.clientX - appState.panX;
                appState.startY = e.clientY - appState.panY;
            });

            window.addEventListener('mousemove', (e) => {
                if (!appState.isDragging) return;
                appState.panX = e.clientX - appState.startX;
                appState.panY = e.clientY - appState.startY;
                applyTransformLayoutProperties();
            });

            window.addEventListener('mouseup', () => {
                appState.isDragging = false;
            });
        }

        function applyTransformLayoutProperties() {
            const canvas = document.getElementById('flowCanvas');
            if(canvas) {
                canvas.style.transform = `translate(${appState.panX}px, ${appState.panY}px) scale(${appState.zoom})`;
            }
        }

        function resetZoomPan() {
            appState.zoom = 1.0;
            appState.panX = 20;
            appState.panY = 20;
            applyTransformLayoutProperties();
        }

        // ==========================================
        // --- VISUAL FLOWCHART LAYOUT PROCESSOR ---
        // ==========================================
        function renderFlowMap() {
            const nodesContainer = document.getElementById('flowNodesContainer');
            const svgElement = document.getElementById('flowSVG');
            if (!nodesContainer || !svgElement) return;

            nodesContainer.innerHTML = '';
            // Clear existing connector tracks cleanly
            svgElement.innerHTML = `
                <defs>
                    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
                        <path d="M 0 1.5 L 9 5 L 0 8.5 z" fill="#94A3B8"/>
                    </marker>
                </defs>
            `;

            let positions = {};
            let leafCount = 0;
            let maxDepth = 0;

            function computeLayout(nodeId, depth) {
                const node = appState.nodes[nodeId];
                if (!node) return;
                if (depth > maxDepth) maxDepth = depth;

                const children = (node.branches || [])
                    .map(b => b.targetId)
                    .filter(id => appState.nodes[id]);

                if (children.length === 0) {
                    positions[nodeId] = { depth: depth, order: leafCount };
                    leafCount++;
                } else {
                    children.forEach(childId => computeLayout(childId, depth + 1));
                    const firstChildOrder = positions[children[0]].order;
                    const lastChildOrder = positions[children[children.length - 1]].order;
                    positions[nodeId] = { depth: depth, order: (firstChildOrder + lastChildOrder) / 2 };
                }
            }

            computeLayout("root", 0);

            const nodeWidth = 110;
            const nodeHeight = 46;
            const hGap = 130;
            const vGap = 90;

            const baseWidth = Math.max(800, leafCount * hGap + 100);
            const baseHeight = Math.max(600, (maxDepth + 2) * vGap);

            const canvas = document.getElementById('flowCanvas');
            canvas.style.width = `${baseWidth}px`;
            canvas.style.height = `${baseHeight}px`;

            // Draw HTML Node Coordinates Layout
            Object.keys(positions).forEach(nodeId => {
                const pos = positions[nodeId];
                const node = appState.nodes[nodeId];
                if (!node) return;

                const x = pos.order * hGap + 30;
                const y = pos.depth * vGap + 30;

                pos.actualX = x + nodeWidth / 2;
                pos.actualY = y + nodeHeight / 2;

                const nodeBtn = document.createElement('button');
                nodeBtn.className = "absolute pointer-events-auto px-2 py-1 text-center text-[10px] font-bold rounded-xl border-2 transition-all duration-150 shadow-sm flex flex-col items-center justify-center hover:shadow-md";
                nodeBtn.style.width = `${nodeWidth}px`;
                nodeBtn.style.height = `${nodeHeight}px`;
                nodeBtn.style.left = `${x}px`;
                nodeBtn.style.top = `${y}px`;

                let colors = "bg-white border-slate-200 text-slate-700 hover:border-slate-300";
                if (nodeId === appState.activeNodeId) {
                    colors = "bg-pink-50 border-brandPurple text-brandPurple ring-4 ring-pink-100";
                } else if (node.type === "end") {
                    colors = "bg-rose-50 border-rose-300 text-rose-700 hover:bg-rose-100/50";
                } else if (nodeId === "root") {
                    colors = "bg-blue-50 border-brandBlue text-brandBlue hover:bg-blue-100/50";
                }
                nodeBtn.className += ` ${colors}`;

                let headerLabel = nodeId === "root" ? "Start" : node.type === "end" ? "End State" : "Step";
                let displayTitle = node.title.length > 14 ? node.title.substring(0, 12) + "..." : node.title;

                nodeBtn.innerHTML = `
                    <span class="text-[8px] font-black uppercase tracking-wider text-slate-400 leading-none">${headerLabel}</span>
                    <span class="truncate w-full block mt-0.5">${nodeId === 'root' ? 'Greeting' : displayTitle}</span>
                `;

                nodeBtn.onclick = (e) => {
                    e.stopPropagation();
                    appState.historyStack = [];
                    appState.activeNodeId = nodeId;
                    renderEditor();
                    renderFlowMap();
                };

                nodesContainer.appendChild(nodeBtn);
            });

            // Draw Connection Path Vectors
            Object.keys(positions).forEach(nodeId => {
                const node = appState.nodes[nodeId];
                if (!node || node.type === "end") return;

                const parentPos = positions[nodeId];

                (node.branches || []).forEach(branch => {
                    const childPos = positions[branch.targetId];
                    if (!childPos) return;

                    const x1 = parentPos.actualX;
                    const y1 = parentPos.actualY + (nodeHeight / 2);
                    const x2 = childPos.actualX;
                    const y2 = childPos.childY ? childPos.childY : childPos.actualY - (nodeHeight / 2);

                    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    const ctrlDist = Math.min(40, Math.abs(y2 - y1) * 0.5);
                    const d = `M ${x1} ${y1} C ${x1} ${y1 + ctrlDist}, ${x2} ${y2 - ctrlDist}, ${x2} ${y2}`;

                    path.setAttribute("d", d);
                    path.setAttribute("fill", "none");
                    path.setAttribute("stroke", branch.isNext ? "#BD519D" : "#94A3B8");
                    path.setAttribute("stroke-width", "2");
                    path.setAttribute("marker-end", "url(#arrow)");

                    svgElement.appendChild(path);
                });
            });

            applyTransformLayoutProperties();
        }

        // ==========================================
        // --- CHAT SIMULATOR PROCESSOR LOGIC ---
        // ==========================================
        let simActiveNodeId = "root";
        let simulatorTimeoutTracker = null;

        function resetSimulation() {
            if (simulatorTimeoutTracker) clearTimeout(simulatorTimeoutTracker);
            const chatDisplay = document.getElementById('chatDisplay');
            chatDisplay.innerHTML = '';
            simActiveNodeId = "root";
            runSimulationStep();
        }

        function runSimulationStep() {
            const chatDisplay = document.getElementById('chatDisplay');
            const choicePanel = document.getElementById('chatChoiceControls');
            choicePanel.innerHTML = '';

            const node = appState.nodes[simActiveNodeId];
            if (!node) return;

            let nodeSpeech = node.text.trim();
            if (!nodeSpeech) {
                if (node.id === "root") nodeSpeech = "Hi! Welcome to my chatbot.";
                else if (node.type === "end") nodeSpeech = "The conversation has ended here.";
                else nodeSpeech = "Here is the next step space.";
            }

            appendMessageBubble(nodeSpeech, 'bot');

            if (node.type === "end") {
                appendRestartButton();
                return;
            }

            if (node.branches.length === 0) {
                appendRestartButton();
                return;
            }

            // CHECK FOR AUTOMATED SEQUENTIAL NEXT STEPS
            const nextContinuationBranch = node.branches.find(b => b.isNext);
            if (nextContinuationBranch) {
                // Spawn animated inline typing loader block indicator
                const typingBlock = document.createElement('div');
                typingBlock.id = "simTypingIndicator";
                typingBlock.className = "flex justify-start items-center gap-1.5 px-4 py-2 text-slate-400 text-xs font-semibold italic animate-pulse";
                typingBlock.innerHTML = `<span>Bot is typing</span><span class="w-1 h-1 rounded-full bg-slate-400 animate-bounce"></span>`;
                chatDisplay.appendChild(typingBlock);
                chatDisplay.scrollTop = chatDisplay.scrollHeight;

                simulatorTimeoutTracker = setTimeout(() => {
                    const indicator = document.getElementById('simTypingIndicator');
                    if (indicator) indicator.remove();
                    simActiveNodeId = nextContinuationBranch.targetId;
                    runSimulationStep();
                }, 1000);
                return;
            }

            // RENDER STANDARD INTERACTIVE CHOICE SELECTION BUTTONS
            node.branches.forEach(branch => {
                const btn = document.createElement('button');
                btn.className = "px-5 py-2 bg-brandGreen text-white hover:bg-opacity-90 rounded-full font-bold text-xs transition-all shadow-sm";
                btn.innerText = branch.text;

                btn.onclick = () => {
                    appendMessageBubble(branch.text, 'user');
                    simActiveNodeId = branch.targetId;
                    choicePanel.innerHTML = '';
                    simulatorTimeoutTracker = setTimeout(runSimulationStep, 400);
                };

                choicePanel.appendChild(btn);
            });
        }

        function appendMessageBubble(text, speaker) {
            const display = document.getElementById('chatDisplay');
            const wrapper = document.createElement('div');
            
            const escaped = escapeHTML(text);
            const formattedText = linkifyText(escaped, speaker);

            if (speaker === 'bot') {
                wrapper.className = "flex justify-start";
                wrapper.innerHTML = `
                    <div class="msg-bubble bot bg-brandBlue text-white px-4 py-2.5 shadow-sm text-sm font-semibold">
                        ${formattedText}
                    </div>
                `;
            } else {
                wrapper.className = "flex justify-end";
                wrapper.innerHTML = `
                    <div class="msg-bubble user bg-brandGreen text-white px-4 py-2.5 shadow-sm text-sm font-semibold">
                        ${formattedText}
                    </div>
                `;
            }

            display.appendChild(wrapper);
            display.scrollTop = display.scrollHeight;
        }

        function appendRestartButton() {
            const choicePanel = document.getElementById('chatChoiceControls');
            const restartBtn = document.createElement('button');
            restartBtn.className = "px-6 py-2.5 bg-slate-700 text-white hover:bg-slate-800 rounded-full font-bold text-xs transition-all shadow-sm";
            restartBtn.innerText = "Start Conversation Over";
            restartBtn.onclick = resetSimulation;
            choicePanel.appendChild(restartBtn);
        }

        // --- MULTI-STEP TUTORIAL ONBOARDING ENGINE ---
        let currentTourStep = 0;
        const tourSteps = [
            {
                title: "Welcome to Chatbot Playground!",
                body: "This playground lets you design, map, and test your very own choice-driven chatbot without writing a single line of code! Let's take a quick 1-minute tour to see how it works.",
                tab: "build"
            },
            {
                title: "Two Ways to Work: Build vs. Test",
                body: "Switch between your work areas using the centered toggle mode bar right above your workspace columns: <br><br>• <strong>🛠️ Build Mode:</strong> Wire your logic architecture scripts using cards and an auto-updating interactive map canvas layout.<br>• <strong>💬 Test Mode:</strong> Jump inside a phone simulation sandbox to chat with your bot live!",
                tab: "build"
            },
            {
                title: "Your Starting Line: Welcome Greeting",
                body: "Every conversation starts here. Write your opening script into the 'What the Bot Says' prompt input area. This is the first sequence users read when your simulation boots up.",
                tab: "build"
            },
            {
                title: "Branching Out with Action Buttons",
                body: "Control how narrative paths unfold using the toolbox at the bottom of the card workspace editor:<br><br>• <strong class=\"text-brandGreen\">+ Add User Response:</strong> Spawns user response options (like 'Yes' or 'No') to split paths.<br>• <strong class=\"text-brandPurple\">Add \"Next ↪️\":</strong> Generates consecutive continuous statements without requiring input actions.<br>• <strong class=\"text-rose-600\">🛑 End Conversation:</strong> Stops dialogue paths and triggers a conversation reset.",
                tab: "build"
            },
            {
                title: "Simulate and Export Your Layouts",
                body: "As your canvas workspace grows, scroll to zoom in/out and click-and-drag empty grid spaces to pan around your flowchart. Once you are finished, click <strong>Export File</strong> to save your JSON data configuration directly to disk!",
                tab: "build"
            }
        ];

        function startTutorial() {
            currentTourStep = 0;
            const modal = document.getElementById('tourModal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('div').classList.remove('scale-95');
            }, 10);
            renderTourStep();
        }

        function closeTutorial() {
            const modal = document.getElementById('tourModal');
            modal.classList.add('opacity-0');
            modal.querySelector('div').classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
            switchTab('build'); 
        }

        function renderTourStep() {
            const stepData = tourSteps[currentTourStep];
            switchTab(stepData.tab);

            document.getElementById('tourContent').innerHTML = `
                <h3 class="text-xl font-black text-brandBlue tracking-wide leading-snug">${stepData.title}</h3>
                <p class="text-sm text-slate-600 font-medium leading-relaxed">${stepData.body}</p>
            `;

            const progressPct = ((currentTourStep + 1) / tourSteps.length) * 100;
            document.getElementById('tourProgress').style.width = `${progressPct}%`;

            const prevBtn = document.getElementById('tourPrevBtn');
            const nextBtn = document.getElementById('tourNextBtn');

            prevBtn.disabled = currentTourStep === 0;

            if (currentTourStep === tourSteps.length - 1) {
                nextBtn.innerText = "Let's Build!";
                nextBtn.className = "px-5 py-2 bg-brandGreen hover:bg-opacity-90 text-white font-bold text-sm rounded-full transition-all shadow-md";
            } else {
                nextBtn.innerText = "Next";
                nextBtn.className = "px-5 py-2 bg-brandBlue hover:bg-opacity-90 text-white font-bold text-sm rounded-full transition-all shadow-md";
            }
        }

        function nextTutorialStep() {
            if (currentTourStep < tourSteps.length - 1) {
                currentTourStep++;
                renderTourStep();
            } else {
                closeTutorial();
            }
        }

        function prevTutorialStep() {
            if (currentTourStep > 0) {
                currentTourStep--;
                renderTourStep();
            }
        }

        // Window resize binding updates map layouts matching layouts
        window.addEventListener('resize', renderFlowMap);
    </script>
</body>
